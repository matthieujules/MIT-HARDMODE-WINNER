# Luxo — The Animated Lamp
# Pixar lamp energy. Expressive, curious. Communicates through light and motion only.

device_id: luxo
device_name: Luxo
device_type: lamp

network:
  ip: "192.168.1.101"        # UPDATE with actual Pi IP
  ssh_user: pi
  master_url: "http://192.168.1.10:8000"  # UPDATE with master laptop IP

hardware:
  led:
    type: rgb_pwm
    pins:
      red: 17
      green: 27
      blue: 22
    pwm_frequency: 1000       # Hz

  servos:
    type: pca9685_i2c
    i2c_address: 0x40
    channels:
      head_pan: 0             # Left-right
      head_tilt: 1            # Up-down nod
      head_roll: 2            # Side tilt (curiosity)
      body_lean: 3            # Forward-back lean
    servo_range:
      min_pulse: 500          # microseconds (SG90)
      max_pulse: 2400
      min_angle: 0
      max_angle: 180
    default_positions:
      head_pan: 90            # Center
      head_tilt: 90           # Level
      head_roll: 90           # Upright
      body_lean: 90           # Straight

  camera:
    type: usb
    device: "/dev/video0"     # UPDATE if needed
    resolution: [640, 480]

  microphone:
    type: usb
    device: null              # Hardware present but voice pipeline does NOT run on Luxo in V1

  speaker:
    enabled: false            # Luxo does not speak

capabilities:
  - see                       # Camera input (motion-gated, frames sent to control plane)
  - light                     # RGB LED control
  - move_head                 # Servo pan/tilt/roll
  - emote                     # Express through light + motion combos
  # Note: mic is physically present but not listed as a capability in V1.
  # Voice pipeline (VAD + Whisper) runs only on Mirror.

actions:
  set_color:
    description: "Set LED to an RGB color"
    params: {r: int, g: int, b: int}
  set_brightness:
    description: "Set overall LED brightness (0-100)"
    params: {brightness: int}
  set_scene:
    description: "Apply a named lighting scene"
    params: {scene: "focus|relax|energy|dim|alert|night|off"}
  look_at:
    description: "Turn head to look in a direction"
    params: {pan: int, tilt: int}
  nod:
    description: "Nod head up and down (yes)"
    params: {speed: "slow|normal|fast"}
  shake:
    description: "Shake head side to side (no)"
    params: {speed: "slow|normal|fast"}
  emote:
    description: "Express an emotion through combined light + motion"
    params: {emotion: "curious|happy|sad|alert|sleepy|excited"}
  perk_up:
    description: "Quick upward motion — attention/surprise"
    params: {}
  droop:
    description: "Slow downward lean — sad/sleepy"
    params: {}
  reset_position:
    description: "Return to default neutral position"
    params: {}
