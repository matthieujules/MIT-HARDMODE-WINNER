# Purse — The Sassy Mobile Companion
# Opinionated, fashionable. Gives style/spending advice. Mobile.

device_id: purse
device_name: Purse
device_type: mobile_companion

network:
  ip: "192.168.1.104"        # UPDATE with actual Pi IP
  ssh_user: pi
  master_url: "http://192.168.1.10:8000"

hardware:
  motors:
    type: pwm_motor_board
    channels:
      front_left:
        pwm_pin: 12
        dir_pin_a: 5
        dir_pin_b: 6
      front_right:
        pwm_pin: 13
        dir_pin_a: 16
        dir_pin_b: 20
      rear_left:
        pwm_pin: 18
        dir_pin_a: 23
        dir_pin_b: 24
      rear_right:
        pwm_pin: 19
        dir_pin_a: 25
        dir_pin_b: 26
    pwm_frequency: 1000

  encoders:
    type: quadrature_gpio
    channels:
      front_left: {a: 4, b: 14}
      front_right: {a: 15, b: 17}
      rear_left: {a: 27, b: 22}
      rear_right: {a: 10, b: 9}
    ticks_per_revolution: 360

  camera:
    type: usb
    device: "/dev/video0"
    resolution: [640, 480]

  microphone:
    type: usb
    device: null

  speaker:
    enabled: true
    type: usb

capabilities:
  - see                       # Camera present but no always-on sensing in V1
  - speak
  - drive
  - spin
  # Note: mic is physically present but voice pipeline runs only on Mirror in V1.

# Purse is a 4-wheel mecanum robot with a speaker.
actions:
  drive_to:
    description: "Drive toward a direction or the user"
    params: {direction: "forward|backward|left|right|to_user", speed: int, duration_ms: int}
  stop:
    description: "Stop all motors"
    params: {}
  speak:
    description: "Say something to the user"
    params: {message: str}
  spin:
    description: "Do a little spin (sassy flourish)"
    params: {direction: "left|right", degrees: int}
  return_home:
    description: "Drive back to home position"
    params: {}
