device_id: lamp
device_name: Lamp
device_type: lem_arm

network:
  ip: "192.168.1.101"
  ssh_user: pi
  master_url: "http://192.168.1.10:8000"

hardware:
  lemp:
    type: rgb_pwm
    pins:
      red: 17
      green: 27
      blue: 22
    pwm_frequency: 1000
    default_color:
      r: 255
      g: 180
      b: 120
    brightness_scale: 1.0

  arm:
    type: so101_serial
    serial:
      port: "/dev/ttyUSB0"
      baud_rate: 115200
      timeout_s: 1.0
    controller:
      protocol: jsonl
      command_topic: "set_joint_angles"
    joints:
      base_yaw:
        servo_id: 1
        min_angle: 0
        max_angle: 180
        home_angle: 90
        link_angle_offset_deg: 0
      shoulder:
        servo_id: 2
        min_angle: 15
        max_angle: 165
        home_angle: 95
        link_angle_offset_deg: 0
      elbow:
        servo_id: 3
        min_angle: 0
        max_angle: 170
        home_angle: 110
        link_angle_offset_deg: 0
      wrist:
        servo_id: 4
        min_angle: 0
        max_angle: 180
        home_angle: 90
        link_angle_offset_deg: 0
    geometry:
      units: mm
      base_height: 96.0
      upper_arm_length: 118.0
      forearm_length: 112.0
      wrist_to_lemp: 58.0
      tool_vertical_offset: 0.0
      shoulder_zero_reference: horizontal_forward
      elbow_zero_reference: straight_with_shoulder
      wrist_zero_reference: inline_with_forearm

presets:
  home:
    joints:
      base_yaw: 90
      shoulder: 95
      elbow: 110
      wrist: 90
    color:
      r: 255
      g: 180
      b: 120
    duration_ms: 1000
  focus:
    joints:
      base_yaw: 90
      shoulder: 78
      elbow: 122
      wrist: 82
    color:
      r: 90
      g: 160
      b: 255
    duration_ms: 1200
  relax:
    joints:
      base_yaw: 90
      shoulder: 110
      elbow: 95
      wrist: 105
    color:
      r: 255
      g: 150
      b: 90
    duration_ms: 1800
  alert:
    joints:
      base_yaw: 90
      shoulder: 70
      elbow: 140
      wrist: 70
    color:
      r: 255
      g: 40
      b: 40
    duration_ms: 500
  curious:
    joints:
      base_yaw: 110
      shoulder: 82
      elbow: 126
      wrist: 70
    color:
      r: 120
      g: 255
      b: 180
    duration_ms: 900

capabilities:
  - arm
  - light
  - emote

actions:
  set_color:
    description: "Set the LEMP RGB light color"
    params:
      r: int
      g: int
      b: int
  set_brightness:
    description: "Set overall light brightness (0.0-1.0)"
    params:
      brightness: float
  set_joint_angles:
    description: "Set all four SO-101 joint targets"
    params:
      base_yaw: float
      shoulder: float
      elbow: float
      wrist: float
  move_to_preset:
    description: "Move the arm to a named preset pose"
    params:
      preset: "home|focus|relax|alert|curious"
  emote:
    description: "Express an emotion through arm pose and light together"
    params:
      emotion: str
  reset_pose:
    description: "Return to the home pose"
    params: {}
