device_id: lamp
device_name: Lamp
device_type: lem_arm

network:
  ip: "192.168.1.101"
  ssh_user: pi
  master_url: "http://192.168.1.10:8000"

hardware:
  lemp:
    type: rgb_pwm
    pins:
      red: 17
      green: 27
      blue: 22
    pwm_frequency: 1000
    default_color:
      r: 255
      g: 180
      b: 120
    brightness_scale: 1.0

  arm:
    type: so101_feetech
    lerobot:
      robot_type: "so101_follower"
      robot_id: "lamp_arm"
      calibration_path: "/home/lamp/Desktop/calibration/lamp_arm.json"
    motor_model: "sts3215"
    norm_mode: "RANGE_M100_100"
    serial:
      port: "/dev/ttyACM0"
      baud_rate: 1000000
      timeout_s: 1.0
    readback:
      register: "Present_Position"
      response_timeout_s: 2.0
    motion:
      raw_frame_ms: 60
      min_raw_frames: 3
      max_raw_frames: 8
    joints:
      base_yaw:
        servo_id: 1
        calibration_name: "shoulder_pan"
        min_angle: 0
        max_angle: 180
        home_angle: 90
        link_angle_offset_deg: 0
      shoulder_pitch:
        servo_id: 2
        calibration_name: "shoulder_lift"
        min_angle: 15
        max_angle: 165
        home_angle: 95
        link_angle_offset_deg: 0
      elbow:
        servo_id: 3
        calibration_name: "elbow_flex"
        min_angle: 0
        max_angle: 170
        home_angle: 110
        link_angle_offset_deg: 0
      wrist_pitch:
        servo_id: 4
        calibration_name: "wrist_flex"
        min_angle: 0
        max_angle: 180
        home_angle: 90
        link_angle_offset_deg: 0
      wrist_roll:
        servo_id: 5
        calibration_name: "wrist_roll"
        min_angle: 0
        max_angle: 180
        home_angle: 90
        link_angle_offset_deg: 0
    geometry:
      units: mm
      base_height: 96.0
      upper_arm_length: 118.0
      forearm_length: 112.0
      wrist_to_lemp: 58.0
      tool_vertical_offset: 0.0
      shoulder_zero_reference: horizontal_forward
      elbow_zero_reference: straight_with_shoulder
      wrist_zero_reference: inline_with_forearm

presets:
  home:
    joints:
      base_yaw: 90
      shoulder_pitch: 95
      elbow: 110
      wrist_pitch: 90
      wrist_roll: 90
    color:
      r: 255
      g: 180
      b: 120
    duration_ms: 1000
  focus:
    joints:
      base_yaw: 90
      shoulder_pitch: 78
      elbow: 122
      wrist_pitch: 82
      wrist_roll: 90
    color:
      r: 90
      g: 160
      b: 255
    duration_ms: 1200
  relax:
    joints:
      base_yaw: 90
      shoulder_pitch: 110
      elbow: 95
      wrist_pitch: 105
      wrist_roll: 90
    color:
      r: 255
      g: 150
      b: 90
    duration_ms: 1800
  alert:
    joints:
      base_yaw: 90
      shoulder_pitch: 70
      elbow: 140
      wrist_pitch: 70
      wrist_roll: 90
    color:
      r: 255
      g: 40
      b: 40
    duration_ms: 500
  curious:
    joints:
      base_yaw: 110
      shoulder_pitch: 82
      elbow: 126
      wrist_pitch: 70
      wrist_roll: 110
    color:
      r: 120
      g: 255
      b: 180
    duration_ms: 900

capabilities:
  - arm
  - light
  - emote

actions:
  set_color:
    description: "Set the LEMP RGB light color"
    params:
      r: int
      g: int
      b: int
  set_brightness:
    description: "Set overall light brightness (0.0-1.0)"
    params:
      brightness: float
  set_joint_angles:
    description: "Set all five SO-101 joint targets"
    params:
      base_yaw: float
      shoulder_pitch: float
      elbow: float
      wrist_pitch: float
      wrist_roll: float
  move_to_preset:
    description: "Move the arm to a named preset pose"
    params:
      preset: "home|focus|relax|alert|curious"
  emote:
    description: "Express an emotion through arm pose and light together"
    params:
      emotion: str
  reset_pose:
    description: "Return to the home pose"
    params: {}
