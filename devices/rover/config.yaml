# Rover — Small mobile coaster with differential drive
# L298N motor board + quadrature encoders. No camera, no mic, no speaker.

device_id: rover
device_name: Rover
device_type: mobile_coaster

network:
  tailscale_hostname: rover-pi
  ssh_user: rover
  master_url: "http://claude-master:8000"

hardware:
  motors:
    type: l298n_differential
    channels:
      right:
        in1: 23                  # Right motor forward
        in2: 24                  # Right motor reverse
      left:
        in3: 16                  # Left motor forward
        in4: 25                  # Left motor reverse
    pwm_frequency: 1000
    gpio_chip: 4                 # Pi 5 = 4, Pi 4 = 0

  encoders:
    type: quadrature_gpio
    channels:
      left: {a: 17, b: 27}
      right: {a: 22, b: 10}
    signals_per_rev: 150
    quad_multiplier: 4

  wheel:
    diameter_cm: 6.8
    wheelbase_cm: 19.2

  buzzer:
    enabled: false
    pin: null

  # No camera, no mic, no speaker

capabilities:
  - drive

actions:
  move:
    description: "Move forward or backward by centimeters"
    params: {distance_cm: float, speed: int}
  rotate:
    description: "Rotate in place by degrees"
    params: {degrees: float, speed: int}
  stop:
    description: "Stop all motors immediately"
    params: {}
  emote:
    description: "Express an emotion through movement"
    params: {emotion: str}
