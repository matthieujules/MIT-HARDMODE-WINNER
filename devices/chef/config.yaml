# Chef — The Food Tray Robot
# Caring, health-conscious. Drives to user and presents food based on mood.

device_id: chef
device_name: Chef
device_type: mobile_tray

network:
  ip: "192.168.1.103"        # UPDATE with actual Pi IP
  ssh_user: pi
  master_url: "http://192.168.1.10:8000"

hardware:
  motors:
    type: pwm_motor_board
    channels:
      front_left:
        pwm_pin: 12
        dir_pin_a: 5
        dir_pin_b: 6
      front_right:
        pwm_pin: 13
        dir_pin_a: 16
        dir_pin_b: 20
      rear_left:
        pwm_pin: 18
        dir_pin_a: 23
        dir_pin_b: 24
      rear_right:
        pwm_pin: 19
        dir_pin_a: 25
        dir_pin_b: 26
    pwm_frequency: 1000

  encoders:
    type: quadrature_gpio
    channels:
      front_left: {a: 4, b: 14}
      front_right: {a: 15, b: 17}
      rear_left: {a: 27, b: 22}
      rear_right: {a: 10, b: 9}
    ticks_per_revolution: 360   # UPDATE with actual encoder spec

  camera:
    type: usb
    device: "/dev/video0"
    resolution: [640, 480]

  microphone:
    type: usb
    device: null

  speaker:
    enabled: true
    type: usb

  food_tray:
    type: pre_programmed
    positions:
      # Rotation angles mapping food items to tray orientation
      # 0 degrees = front of tray faces user
      healthy: 0
      comfort: 90
      snacks: 180
      drinks: 270

capabilities:
  - see                       # Camera present but no always-on sensing in V1
  - speak
  - drive
  - spin
  - serve_food
  # Note: mic is physically present but voice pipeline runs only on Mirror in V1.

actions:
  drive_to:
    description: "Drive toward a direction or the user"
    params: {direction: "forward|backward|left|right|to_user", speed: int, duration_ms: int}
  spin:
    description: "Rotate the tray in place to present a food section"
    params: {angle: int}
  serve:
    description: "Rotate tray to present a specific food category to the user"
    params: {category: "healthy|comfort|snacks|drinks"}
  stop:
    description: "Stop all motors immediately"
    params: {}
  speak:
    description: "Say something to the user"
    params: {message: str}
  return_home:
    description: "Drive back to home/charging position"
    params: {}
