# Mirror — Primary conversational device
# Has its OWN camera (face-to-face with user), speaker, tilt servo
# No mic (global mic is separate)

device_id: mirror
device_name: Mirror
device_type: companion

network:
  tailscale_hostname: mirror-pi
  ssh_user: pi
  master_url: "http://claude-master:8000"

hardware:
  servos:
    type: pca9685_i2c
    i2c_address: 0x40
    channels:
      tilt: 0                # UPDATE — single servo, tilt the mirror face
    servo_range:
      min_pulse: 500         # UPDATE
      max_pulse: 2400
      min_angle: 0
      max_angle: 180
    default_positions:
      tilt: 90

  camera:
    type: usb
    device: "/dev/video0"    # UPDATE if needed
    resolution: [640, 480]
    # Mirror's OWN camera — face-to-face with the user
    # Used for mood, appearance, and expression analysis
    # Frames sent to control plane for Claude Vision

  speaker:
    enabled: true
    type: usb                # UPDATE — "usb" or "i2s"

  # No mic — global mic handles all voice input

capabilities:
  - see                      # Mirror's own camera (face-to-face)
  - speak                    # TTS output
  - move_tilt                # Tilt servo for physical expression

actions:
  speak:
    description: "Say something to the user through TTS"
    params: {message: str}
  tilt:
    description: "Tilt the mirror face up or down"
    params: {angle: int}
  nod:
    description: "Nod the mirror (agreement)"
    params: {speed: "slow|normal|fast"}
  look_up:
    description: "Tilt up to face the user"
    params: {}
  look_down:
    description: "Tilt down (shy/thinking)"
    params: {}
